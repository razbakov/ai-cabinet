  <circle cx="18.5" cy="13.5" r="5" fill="none" stroke="#7c3aed" stroke-width="1.2" stroke-opacity="0.5"/>
  <circle cx="13.5" cy="18.5" r="5" fill="none" stroke="#7c3aed" stroke-width="1.2" stroke-opacity="0.5"/>
  <circle cx="18.5" cy="18.5" r="5" fill="none" stroke="#7c3aed" stroke-width="1.2" stroke-opacity="0.5"/>
